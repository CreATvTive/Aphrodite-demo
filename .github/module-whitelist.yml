# 模块白名单：每个模块只允许修改自己的目录。
# 注意：将 owner/maintainer/contributor 与 CODEOWNERS、分支保护规则联动。

modules:
  # Chatbox v0 当前主线
  chatbox:
    paths:
      - "app/chatbox/**"
  chatbox-docs:
    paths:
      - "docs/chatbox/**"
  chatbox-contracts:
    paths:
      - "docs/chatbox/contracts/**"
  tests:
    paths:
      - "tests/**"

  # Legacy/non-default：保留供独立维护，不作为 chatbox v0 默认入口或依赖
  agentlib:
    paths:
      - "agentlib/**"
  agent-kernel:
    paths:
      - "agent_kernel/**"
  semantic-trigger:
    paths:
      - "src/semantic_trigger/**"
  memory:
    paths:
      - "src/memory/**"
  cli:
    paths:
      - "cli/**"

global_allowlist:
  # 文档与治理配置允许跨模块修改
  # 冻结合同/高风险路径（docs/chatbox/**、docs/design/aphrodite_private_origin_design_source.md、
  # docs/governance/pr-governance.md）不在此列，须通过对应模块声明或 Owner 审批。
  - "docs/README.md"
  - "docs/archive/**"
  - "docs/design/README.md"
  - "docs/design/visual-direction.md"
  - ".github/**"
  - "README.md"
  - "FRAMEWORK.md"
  - "DELIVERY_REPORT.md"
  - "requirements.txt"

# 高风险路径：需要 Owner 审批（见 docs/governance/pr-governance.md）
high_risk_paths:
  - "app/chatbox/**"
  - "docs/chatbox/phase-plan-v0.md"
  - "docs/chatbox/contracts/**"
  - "docs/design/aphrodite_private_origin_design_source.md"
  - "docs/governance/pr-governance.md"
  - "AGENTS.md"
  - "agent_kernel/**"
  - "agentlib/runtime_engine.py"
  - "agentlib/patch_executor.py"
  - ".github/workflows/**"
